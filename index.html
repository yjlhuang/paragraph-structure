<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>篇章結構解題訓練 — 學測指考攻略</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
:root{
  --bg:#0c0b09;--bg2:#131210;--surface:#1c1a16;--card:#242018;
  --border:#38321e;--border2:#2a2518;
  --gold:#c8a24a;--gold-dim:#7a6128;--gold-bg:#1e1a0c;
  --text:#e6d9b8;--text-dim:#8a7d5e;--text-xs:#5a5040;
  --green:#5ab876;--green-bg:#0e1e12;--green-b:#1e4028;
  --red:#d45050;--red-bg:#1e0e0e;--red-b:#4a1a1a;
  --blue:#5588cc;--blue-bg:#0e1622;--blue-b:#1a2e4a;
  --amber:#d4883a;--amber-bg:#1e1208;
  --teal:#4aa8a0;--teal-bg:#0a1a18;--teal-b:#1a3830;
  --purple:#b066cc;--purple-bg:#1a0e1e;--purple-b:#3a1a4a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 80px;}
.screen{width:100%;max-width:760px;padding:0 14px;display:none;flex-direction:column;align-items:center;}
.screen.on{display:flex;}

/* HEADER */
.site-hd{text-align:center;padding:26px 0 18px;width:100%;}
.site-hd .eyebrow{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:4px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:8px;}
.site-hd h1{font-family:'Noto Serif TC',serif;font-size:clamp(19px,4.5vw,28px);font-weight:700;color:var(--text);letter-spacing:2px;margin-bottom:4px;}
.site-hd .sub{font-size:11px;color:var(--text-dim);letter-spacing:1px;}

/* TABS */
.tab-bar{display:flex;gap:6px;width:100%;margin-bottom:16px;}
.tab-btn{flex:1;padding:8px 4px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;
  background:var(--surface);border:1px solid var(--border2);border-radius:6px;
  color:var(--text-dim);cursor:pointer;transition:all .15s;text-align:center;}
.tab-btn.active{background:var(--gold-bg);border-color:var(--gold-dim);color:var(--gold);}

/* LESSON GRID */
.lesson-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;}
@media(max-width:460px){.lesson-grid{grid-template-columns:1fr;}}
.lc{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:14px 14px 12px;cursor:pointer;transition:border-color .18s,background .18s;position:relative;overflow:hidden;}
.lc:hover{border-color:var(--gold-dim);background:#1e1c16;}
.lc.lc-done{border-color:var(--green-b);}
.lc.lc-done::after{content:'✓';position:absolute;top:9px;right:11px;color:var(--green);font-family:'JetBrains Mono',monospace;font-size:11px;}
.lc-num{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-xs);margin-bottom:5px;}
.lc-score{display:inline-block;margin-left:6px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--green);border:1px solid var(--green-b);border-radius:4px;padding:1px 5px;}
.lc-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;line-height:1.4;}
.lc-desc{font-size:11px;color:var(--text-dim);line-height:1.6;}
.lc-tag{display:inline-block;margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;letter-spacing:1px;}
.tag-exam{background:#1a0e06;color:#d4883a;border:1px solid #4a2e08;}
.tag-gsat{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-b);}

/* BACK BTN */
.back-btn{align-self:flex-start;display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;background:none;border:1px solid var(--border2);border-radius:5px;padding:7px 12px;cursor:pointer;margin:10px 0 16px;transition:color .15s,border-color .15s;}
.back-btn:hover{color:var(--gold);border-color:var(--gold-dim);}

/* QUIZ HEADER */
.quiz-hd{width:100%;display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border2);margin-bottom:12px;}
.quiz-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;flex:1;}
.quiz-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-xs);}
.prog-bar{width:100%;height:3px;background:var(--border2);border-radius:2px;margin-bottom:16px;}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s;}

/* MODE TOGGLE */
.mode-toggle{display:flex;gap:6px;width:100%;margin-bottom:14px;}
.mode-btn{flex:1;padding:7px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1px;background:var(--surface);border:1px solid var(--border2);border-radius:6px;color:var(--text-dim);cursor:pointer;text-align:center;transition:all .15s;}
.mode-btn.active{background:var(--gold-bg);border-color:var(--gold-dim);color:var(--gold);}

/* PASSAGE */
.passage-wrap{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:18px;margin-bottom:14px;font-size:13px;line-height:2.0;color:var(--text);}
.blank{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-dim);border-radius:4px;padding:1px 8px;margin:0 2px;min-width:36px;text-align:center;cursor:pointer;transition:all .15s;}
.blank:hover{background:#2a2010;border-color:var(--gold);}
.blank.current{box-shadow:0 0 0 2px var(--gold);}
.blank.answered-ok{color:var(--green);background:var(--green-bg);border-color:var(--green-b);}
.blank.answered-err{color:var(--red);background:var(--red-bg);border-color:var(--red-b);}

/* PRIORITY PANEL */
.priority-panel{width:100%;margin-bottom:14px;}
.priority-item{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;margin-bottom:6px;transition:border-color .15s;}
.priority-item.current-q{border-color:var(--gold-dim);background:var(--gold-bg);}
.priority-item.done-q{border-color:var(--green-b);opacity:.6;}
.pi-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.pi-order{font-family:'JetBrains Mono',monospace;font-size:9px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg2);color:var(--text-xs);border:1px solid var(--border2);flex-shrink:0;}
.priority-item.current-q .pi-order{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-dim);}
.pi-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold);font-weight:700;}
.pi-type{font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 6px;border-radius:3px;background:var(--bg2);color:var(--text-xs);border:1px solid var(--border2);}
.pi-hook{font-size:12px;color:var(--text-dim);line-height:1.7;margin-bottom:4px;}
.pi-signal{font-size:12px;color:var(--teal);line-height:1.7;}
.pi-checkmark{margin-left:auto;color:var(--green);font-size:14px;}

/* Q STEM */
.q-stem{font-size:13px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.6;}
.q-blank-badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-dim);border-radius:4px;padding:1px 7px;margin-right:6px;}

/* OPTIONS */
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.opt{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:12px 14px;cursor:pointer;transition:border-color .15s,background .15s;font-size:12px;line-height:1.7;color:var(--text);display:flex;gap:10px;align-items:flex-start;}
.opt:hover:not(.opt-off){border-color:var(--gold-dim);background:#1e1c16;}
.opt-letter{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;background:var(--bg2);border:1px solid var(--border2);border-radius:3px;padding:1px 6px;flex-shrink:0;margin-top:1px;color:var(--text-dim);}
.opt.opt-ok{border-color:var(--green-b);background:var(--green-bg);}
.opt.opt-ok .opt-letter{background:var(--green-bg);color:var(--green);border-color:var(--green-b);}
.opt.opt-err{border-color:var(--red-b);background:var(--red-bg);}
.opt.opt-err .opt-letter{background:var(--red-bg);color:var(--red);border-color:var(--red-b);}
.opt.opt-reveal{border-color:var(--green-b);}
.opt.opt-off{cursor:default;}

/* EXPLAIN */
.explain-box{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:14px;margin-bottom:12px;font-size:12px;line-height:1.85;color:var(--text-dim);}
.explain-box .ex-head{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
.strategy-tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;border-radius:3px;margin-bottom:6px;letter-spacing:1px;}

/* BUTTONS */
.action-btn{width:100%;background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-dim);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;padding:13px;cursor:pointer;transition:background .18s,border-color .18s;margin-bottom:8px;}
.action-btn:hover{background:#2a2010;border-color:var(--gold);}
.action-btn.btn-green{background:var(--green-bg);color:var(--green);border-color:var(--green-b);}
.action-btn.btn-green:hover{background:#142a1c;}
.action-btn.btn-dim{background:var(--bg2);color:var(--text-dim);border-color:var(--border2);}

/* RESULT */
.result-hero{text-align:center;padding:28px 0 18px;}
.big-score{font-family:'JetBrains Mono',monospace;font-size:52px;font-weight:700;color:var(--gold);line-height:1;margin-bottom:8px;}
.result-label{font-size:12px;color:var(--text-dim);letter-spacing:2px;}
.result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0;}
.rg-item{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:12px;text-align:center;}
.rg-num{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;}
.rg-label{font-size:10px;color:var(--text-dim);margin-top:3px;}
.wrong-item{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:12px;margin-bottom:8px;font-size:12px;line-height:1.7;}
.wrong-item .wi-q{color:var(--text);margin-bottom:6px;font-weight:700;}
.wrong-item .wi-your{color:var(--red);margin-bottom:4px;}
.wrong-item .wi-ans{color:var(--green);margin-bottom:6px;}
.wrong-item .wi-exp{color:var(--text-dim);}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen on" id="scr-home">
  <div class="site-hd">
    <div class="eyebrow">學測指考英文攻略</div>
    <h1>篇章結構解題訓練</h1>
    <div class="sub">100–115年 · 指考6選5 · 學測5選4 · Priority解題順序</div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="filterLessons('all')">全部（16）</button>
    <button class="tab-btn" onclick="filterLessons('指考')">指考 100–110</button>
    <button class="tab-btn" onclick="filterLessons('學測')">學測 111–115</button>
  </div>
  <div class="lesson-grid" id="lesson-grid"></div>
</div>

<!-- QUIZ -->
<div class="screen" id="scr-quiz">
  <button class="back-btn" onclick="confirmBack()">← 返回</button>
  <div class="quiz-hd">
    <div class="quiz-title" id="q-title">載入中</div>
    <div class="quiz-meta" id="q-meta">0/0</div>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="mode-priority" onclick="setMode('priority')">🎯 Priority 模式</button>
    <button class="mode-btn" id="mode-seq" onclick="setMode('seq')">📋 題號順序</button>
  </div>

  <div id="quiz-content"></div>
</div>

<!-- RESULT -->
<div class="screen" id="scr-result">
  <div class="result-hero">
    <div class="big-score" id="res-score">—</div>
    <div class="result-label" id="res-label">得分</div>
  </div>
  <div class="result-grid">
    <div class="rg-item"><div class="rg-num" id="res-ok" style="color:var(--green)">—</div><div class="rg-label">答對</div></div>
    <div class="rg-item"><div class="rg-num" id="res-err" style="color:var(--red)">—</div><div class="rg-label">答錯</div></div>
    <div class="rg-item"><div class="rg-num" id="res-total" style="color:var(--gold)">—</div><div class="rg-label">總題數</div></div>
  </div>
  <div id="res-wrong-review"></div>
  <button class="action-btn btn-green" onclick="retryLesson()">重新練習</button>
  <button class="action-btn btn-dim" onclick="goHome()">← 回主頁</button>
  <button class="action-btn btn-dim" id="res-reset-btn" style="font-size:10px;opacity:.5;margin-top:4px;">清除所有進度</button>
</div>

<script>
const LESSONS = [
  {
    id: '100指考',
    year: '100', etype: '指考',
    topic: "校園霸凌",
    tagClass: 'tag-exam', tagLabel: '指考',
    optCount: 6, nQ: 5,
    passage: "The effect of bullying can be serious and even lead to tragedy.\nUnfortunately, it is still a mostly unresearched area.\n\n31 That year two shotgun-wielding students, both of whom had been\nidentified as gifted and who had been bullied for years, killed 13\npeople, wounded 24 and then committed suicide. A year later an analysis\nby the US government found that bullying played a major role in more\nthan two-thirds of the campus violence.\n\n32 Numerous dictators and invaders throughout history have tried to\njustify their bullying behavior by claiming that they themselves were\nbullied. 33 Although it is no justification for bullying, many of the\nworst humans in history have indeed been bullies and victims of\nbullying.\n\nSince bullying is mostly ignored, it may provide an important clue in\ncrowd behavior and passer-by behavior. 34 Many of them have suggested\nbullying as one of the reasons of this decline in emotional sensitivity\nand acceptance of violence as normal. When someone is bullied, it is not\nonly the bully and the victim who are becoming less sensitive to\nviolence. 35 In this sense, bullying affects\n\nnot only the bullied but his friends and classmates and the whole\nsociety.",
    options: [
        {k:'A', text:"Hitler, for example, is claimed to have been a victim of bullying in his childhood."}
        {k:'B', text:"Campus bullying is becoming a serious problem in some high schools in big cities."}
        {k:'C', text:"The friends and classmates of the bully and the victim may accept the violence as normal."}
        {k:'D', text:"Research indicates that bullying may form a chain reaction and the victim often becomes the bully."}
        {k:'E', text:"Psychologists have been puzzled by the inactivity of crowds and bystanders in urban centers when crimes occur in crowded places."}
        {k:'F', text:"The link between bullying and school violence has attracted increasing attention since the 1999 tragedy at a Colorado high school."}
    ],
    answers: ["F", "D", "A", "E", "C"],
    priority: [
        {num:31,order:1,type:"時序掛鉤",hook:"後句 \"That year\" — That year指哪一年？前面需要先提到某個事件年份",signal:"選(F)：mentions 1999 tragedy → 確立That year的指代"}
        {num:35,order:2,type:"代名詞掛鉤",hook:"後句 \"In this sense, bullying affects not only the bullied but his friends\"",signal:"選(C)：friends and classmates...accept violence as normal（直接呼應後句）"}
        {num:34,order:3,type:"代名詞掛鉤",hook:"後句 \"Many of them have suggested bullying...\" — them指誰？",signal:"選(E)：Psychologists...puzzled by inactivity of crowds（they = psychologists）"}
        {num:32,order:4,type:"主題句",hook:"後文列舉歷史上的霸凌者（dictators, invaders）",signal:"選(D)：Research...bullying forms chain reaction（引出後文霸凌者也曾是受害者的模式）"}
        {num:33,order:5,type:"排除消去",hook:"剩A：Hitler被霸凌的例子，接在dictators後面",signal:"選(A)：Hitler...victim of bullying（具體舉例支撐前句）"}
    ]
  },
  {
    id: '101指考',
    year: '101', etype: '指考',
    topic: "廣告的本質",
    tagClass: 'tag-exam', tagLabel: '指考',
    optCount: 6, nQ: 5,
    passage: "All advertising includes an attempt to persuade. 31 Even if an\nadvertisement claims to be purely informational, it still has persuasion\nat its core. The ad informs the consumers with one purpose: to get the\nconsumer to like the brand and, on that basis, to eventually buy the\nbrand. Without this persuasive intent, communication about a product\nmight be news, but it would not be advertising.\n\nAdvertising can be persuasive communication not only about a product but\nalso an idea or a person.\n\n32 Although political ads are supposed to be concerned with the public\nwelfare, they are paid for and they all have a persuasive intent. 33 A\nBush campaign ad, for instance, did not ask anyone to buy anything, yet\nit attempted to persuade American citizens to view George Bush\nfavorably. 34 Critics of President Clinton’s health care plan used\nadvertising to influence lawmakers and defeat the government’s plan.\n\n35 For instance, the international organization Greenpeace uses\nadvertising to get their message out. In the ads, they warn people about\nserious pollution problems and the urgency of protecting the\nenvironment. They, too, are selling something and trying to make a\npoint.",
    options: [
        {k:'A', text:"Political advertising is one example."}
        {k:'B', text:"To put it another way, ads are communication designed to get someone to do something."}
        {k:'C', text:"Advertising can be the most important source of income for the media through which it is conducted."}
        {k:'D', text:"They differ from commercial ads in that political ads “sell” candidates rather than commercial goods."}
        {k:'E', text:"Aside from campaign advertising, political advertising is also used to persuade people to support or oppose proposals."}
        {k:'F', text:"In addition to political parties, environmental groups and human rights organizations also buy advertising to persuade people to accept their way of thinking."}
    ],
    answers: ["B", "A", "D", "E", "F"],
    priority: [
        {num:31,order:1,type:"代名詞掛鉤",hook:"後句 \"The ad informs...to get the consumer to like the brand\" — 需要前句定義廣告的目的",signal:"選(B)：ads are communication designed to get someone to do something（定義廣告）"}
        {num:32,order:2,type:"主題句",hook:"後文談政治廣告（political ads, Bush campaign）",signal:"選(A)：Political advertising is one example（引出政治廣告這個子主題）"}
        {num:33,order:3,type:"關鍵字重疊",hook:"前句 political ads are paid for，後句 Bush campaign ad",signal:"選(D)：They differ from commercial ads...sell candidates（they = political ads，對比商業廣告）"}
        {num:34,order:4,type:"舉例延伸",hook:"前Bush例子，後Clinton例子，空格在中間連接兩個例子",signal:"選(E)：Aside from campaign advertising...also used to persuade（延伸到更廣的政治廣告類型）"}
        {num:35,order:5,type:"排除消去",hook:"後句 Greenpeace uses advertising — 剩下(F)",signal:"選(F)：environmental groups...also buy advertising（引出環保團體這個例子，Greenpeace是具體說明）"}
    ]
  },
  {
    id: '102指考',
    year: '102', etype: '指考',
    topic: "麵包師的故事",
    tagClass: 'tag-exam', tagLabel: '指考',
    optCount: 6, nQ: 5,
    passage: "In the Dutch colonial town later known as Albany, New York, there lived\na baker, Van Amsterdam, who was as honest as he could be. He took great\ncare to give his customers exactly what they paid for—not more and not\nless.\n\nOne Saint Nicholas Day morning, when the baker was just ready for\nbusiness, the door of his shop flew open. 31 She asked for a dozen of\nthe baker’s Saint Nicholas cookies. Van Amsterdam counted out twelve\ncookies. But the woman insisted that a dozen is thirteen. Van Amsterdam\nwas not a man to bear foolishness. He refused. The woman turned to go\nwithout the cookies but she stopped at the door, saying, “Van Amsterdam!\nHowever honest you may be, your heart is small and your fist is tight.”\nThen she was gone.\n\n32 His bread rose too high or not at all. His pies were sour or too\nsweet. His cookies were burnt or doughy. His customers soon noticed the\ndifference and slipped away.\n\nA year passed. The baker grew poorer and poorer. Finally, on the day\nbefore Saint Nicholas Day, no customer came to his shop. 33\n\nThat night, the baker had a dream. He saw Saint Nicholas pulling out\ngifts from his baskets for a crowd of happy children. No matter how many\npresents Nicholas handed out, there were always more to give. Then\nsomehow, Saint Nicholas turned into the old woman with the long black\nshawl!\n\n34 He suddenly realized that he always gave his customers exactly what\nthey paid for, “But why not give more?”\n\nThe next morning, on Saint Nicholas Day, the baker rose early to make\ncookies. And to his surprise, the cookies were as fine as they could be.\nWhen he had just finished, the old woman appeared at his door again. She\nasked for a dozen of Van Amsterdam’s Saint Nicholas cookies. 35\n\nWhen people heard he counted thirteen as a dozen, he had more customers\nthan ever and became wealthy. The practice then spread to other towns as\na common custom.",
    options: [
        {k:'A', text:"Van Amsterdam awoke with a start."}
        {k:'B', text:"In walked an old woman wrapped in a long black shawl."}
        {k:'C', text:"The more he took from the baskets, the more they seemed to hold."}
        {k:'D', text:"From that day, everything went wrong in Van Amsterdam’s bakery."}
        {k:'E', text:"In great excitement, Van Amsterdam counted out twelve cookies—and one more."}
        {k:'F', text:"Staring at his unsold Saint Nicholas cookies, he prayed that Saint Nicholas could help him."}
    ],
    answers: ["B", "D", "F", "A", "E"],
    priority: [

// ── localStorage ──
function loadScores(){try{return JSON.parse(localStorage.getItem('ps2_scores')||'{}');}catch(e){return{};}}
function saveScores(s){try{localStorage.setItem('ps2_scores',JSON.stringify(s));}catch(e){}}

// ── STATE ──
let state = {
  lessonId: null,
  mode: 'priority',       // 'priority' | 'seq'
  qOrder: [],             // 題號順序（priority或sequential）
  qIdx: 0,               // 當前在qOrder中的位置
  answered: {},           // num -> {chosen, correct}
  scores: loadScores(),
  currentTab: 'all',
};

// ── SCREENS ──
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');window.scrollTo(0,0);}
function goHome(){buildHome();showScreen('scr-home');}
function confirmBack(){if(confirm('確定離開？進度不會保存。'))goHome();}

// ── HOME ──
function filterLessons(tab){
  state.currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['all','指考','學測'][i]===tab);
  });
  buildHome();
}

function buildHome(){
  const grid = document.getElementById('lesson-grid');
  const filtered = state.currentTab === 'all'
    ? LESSONS
    : LESSONS.filter(l => l.etype === state.currentTab);

  grid.innerHTML = filtered.map(l => {
    const sc = state.scores[l.id];
    const done = sc && sc.correct + sc.wrong >= l.nQ;
    const scoreTag = sc ? `<span class="lc-score">${sc.correct}/${l.nQ}</span>` : '';
    return `<div class="lc ${done?'lc-done':''}" onclick="startLesson('${l.id}')">
      <div class="lc-num">${l.year}${l.etype}${scoreTag}</div>
      <div class="lc-title">${l.topic}</div>
      <div class="lc-desc">${l.optCount}選${l.nQ}題</div>
      <span class="lc-tag ${l.tagClass}">${l.tagLabel}</span>
    </div>`;
  }).join('');
}

// ── START LESSON ──
function startLesson(id){
  const l = LESSONS.find(x=>x.id===id);
  if(!l) return;
  state.lessonId = id;
  state.qIdx = 0;
  state.answered = {};
  buildQOrder(l);
  document.getElementById('q-title').textContent = `${l.year}${l.etype} — ${l.topic}`;
  showScreen('scr-quiz');
  renderQuiz();
}

function buildQOrder(l){
  if(state.mode === 'priority'){
    // priority順序
    const nums = l.priority.map(p=>p.num);
    // 補上沒在priority裡的題號（以防萬一）
    for(let i=31;i<31+l.nQ;i++){if(!nums.includes(i))nums.push(i);}
    state.qOrder = nums;
  } else {
    // 題號順序
    state.qOrder = Array.from({length:l.nQ},(_,i)=>31+i);
  }
}

function setMode(mode){
  state.mode = mode;
  document.getElementById('mode-priority').classList.toggle('active', mode==='priority');
  document.getElementById('mode-seq').classList.toggle('active', mode==='seq');
  if(state.lessonId){
    const l = LESSONS.find(x=>x.id===state.lessonId);
    buildQOrder(l);
    state.qIdx = 0;
    state.answered = {};
    renderQuiz();
  }
}

// ── RENDER QUIZ ──
function renderQuiz(){
  const l = LESSONS.find(x=>x.id===state.lessonId);
  const total = state.qOrder.length;
  const idx = state.qIdx;
  const currentNum = state.qOrder[idx];

  // progress
  const done = Object.keys(state.answered).length;
  document.getElementById('prog-fill').style.width = `${(done/total)*100}%`;
  document.getElementById('q-meta').textContent = `${done}/${total}`;

  let html = '';

  // 文章（顯示所有空格，已答的顯示答案）
  html += buildPassageHtml(l);

  // Priority panel
  if(state.mode === 'priority'){
    html += `<div class="priority-panel">
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-xs);text-transform:uppercase;margin-bottom:8px;">解題優先順序</div>`;
    for(const p of l.priority){
      const isDone = state.answered[p.num] !== undefined;
      const isCurrent = p.num === currentNum;
      html += `<div class="priority-item ${isCurrent?'current-q':''} ${isDone?'done-q':''}" onclick="jumpToQ(${p.num})">
        <div class="pi-head">
          <div class="pi-order">${p.order}</div>
          <div class="pi-num">第${p.num}題</div>
          <span class="pi-type">${p.type}</span>
          ${isDone?'<span class="pi-checkmark">✓</span>':''}
        </div>
        <div class="pi-hook">🔍 ${p.hook}</div>
        ${isCurrent?`<div class="pi-signal">→ ${p.signal}</div>`:''}
      </div>`;
    }
    html += `</div>`;
  }

  // 當前題目
  html += buildQuestionHtml(l, currentNum);

  document.getElementById('quiz-content').innerHTML = html;
}

function buildPassageHtml(l){
  let p = l.passage;
  // 替換題號為可點擊空格
  for(let i=31;i<31+l.nQ;i++){
    const ans = state.answered[i];
    let cls = 'blank';
    let label = String(i);
    if(ans){
      cls += ans.correct ? ' answered-ok' : ' answered-err';
      label = `${i}(${ans.chosen})`;
    }
    if(i === state.qOrder[state.qIdx] && !ans) cls += ' current';
    p = p.replace(new RegExp(`\\b${i}\\b`,'g'),
      `<span class="${cls}" onclick="jumpToQ(${i})" id="blank-${i}">${label}</span>`);
  }
  return `<div class="passage-wrap">${p.replace(/\n\n/g,'<br><br>').replace(/\n/g,' ')}</div>`;
}

function buildQuestionHtml(l, num){
  const ans = state.answered[num];
  const pi = l.priority.find(p=>p.num===num);

  let html = `<div class="q-stem"><span class="q-blank-badge">${num}</span>請選出最適合填入空格的選項：</div>`;
  html += `<div class="options" id="opts-${num}">`;
  for(const opt of l.options){
    let cls = 'opt';
    if(ans){
      cls += ' opt-off';
      if(opt.k === l.answers[num-31]) cls += ' opt-ok';
      else if(opt.k === ans.chosen && !ans.correct) cls += ' opt-err';
    }
    html += `<div class="${cls}" id="opt-${opt.k}" onclick="chooseOpt('${opt.k}',${num})">
      <span class="opt-letter">${opt.k}</span>
      <span>${opt.text}</span>
    </div>`;
  }
  html += `</div>`;

  // 解析（已答才顯示）
  if(ans && pi){
    const stratColor = {'代名詞掛鉤':'var(--blue)','轉折掛鉤':'var(--red)','關鍵字重疊':'var(--gold)','時序掛鉤':'var(--teal)','承上啟下':'var(--purple)','段首主題句':'var(--amber)','因果掛鉤':'var(--amber)','舉例掛鉤':'var(--amber)','平行列舉':'var(--blue)','排除消去':'var(--text-dim)','功能說明':'var(--teal)','論點支撐':'var(--teal)','細節補充':'var(--teal)','段落總結':'var(--purple)','舉例延伸':'var(--amber)'}[pi.type] || 'var(--gold)';
    html += `<div class="explain-box">
      <div class="ex-head">${ans.correct?'✓ 答對':'✗ 解析'}</div>
      <span class="strategy-tag" style="background:var(--bg2);color:${stratColor};border:1px solid ${stratColor}33;">${pi.type}</span>
      <p>${pi.signal}</p>
    </div>`;
  }

  const remaining = state.qOrder.filter(n=>!state.answered[n]);
  const isLast = remaining.length === 0 || (remaining.length === 1 && remaining[0] === num && ans);
  if(ans){
    if(isLast || Object.keys(state.answered).length >= l.nQ){
      html += `<button class="action-btn btn-green" onclick="showResult()">查看結果 →</button>`;
    } else {
      html += `<button class="action-btn" onclick="nextQ()">下一題 →</button>`;
    }
  }
  return html;
}

function jumpToQ(num){
  if(state.answered[num] !== undefined) return; // 已答不跳
  const l = LESSONS.find(x=>x.id===state.lessonId);
  state.qIdx = state.qOrder.indexOf(num);
  renderQuiz();
  setTimeout(()=>{
    const el = document.querySelector('.q-stem');
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  }, 100);
}

function chooseOpt(k, num){
  const l = LESSONS.find(x=>x.id===state.lessonId);
  if(state.answered[num]) return;
  const correct = k === l.answers[num-31];
  state.answered[num] = {chosen:k, correct};
  renderQuiz();
  setTimeout(()=>{
    const el = document.getElementById(`opt-${k}`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
  }, 100);
}

function nextQ(){
  const remaining = state.qOrder.filter(n=>!state.answered[n]);
  if(remaining.length > 0){
    state.qIdx = state.qOrder.indexOf(remaining[0]);
    renderQuiz();
    window.scrollTo(0,0);
  } else {
    showResult();
  }
}

// ── RESULT ──
function showResult(){
  const l = LESSONS.find(x=>x.id===state.lessonId);
  const total = l.nQ;
  const correct = Object.values(state.answered).filter(a=>a.correct).length;
  const wrong = total - correct;
  const pct = Math.round(correct/total*100);

  state.scores[l.id] = {correct, wrong, total};
  saveScores(state.scores);
  buildHome();

  document.getElementById('res-score').textContent = `${correct}/${total}`;
  document.getElementById('res-label').textContent = `答對率 ${pct}%`;
  document.getElementById('res-ok').textContent = correct;
  document.getElementById('res-err').textContent = wrong;
  document.getElementById('res-total').textContent = total;

  let reviewHtml = '';
  const wrongItems = Object.entries(state.answered).filter(([,a])=>!a.correct);
  if(wrongItems.length > 0){
    reviewHtml += `<div style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--text-xs);text-transform:uppercase;margin-bottom:10px;">需要複習的題目</div>`;
    for(const [numStr, ans] of wrongItems){
      const num = parseInt(numStr);
      const pi = l.priority.find(p=>p.num===num);
      const correctAns = l.answers[num-31];
      const correctText = l.options.find(o=>o.k===correctAns)?.text || '';
      const chosenText = l.options.find(o=>o.k===ans.chosen)?.text || '';
      reviewHtml += `<div class="wrong-item">
        <div class="wi-q">第${num}題（${l.year}${l.etype}）${pi?` — ${pi.type}`:''}</div>
        <div class="wi-your">✗ 你選了 (${ans.chosen}) ${chosenText.substring(0,50)}...</div>
        <div class="wi-ans">✓ 正確 (${correctAns}) ${correctText.substring(0,50)}...</div>
        ${pi?`<div class="wi-exp">${pi.signal}</div>`:''}
      </div>`;
    }
  }
  document.getElementById('res-wrong-review').innerHTML = reviewHtml;

  document.getElementById('res-reset-btn').onclick = ()=>{
    if(confirm('確定清除所有練習記錄？')){
      localStorage.removeItem('ps2_scores');
      state.scores = {};
      goHome();
    }
  };

  showScreen('scr-result');
}

function retryLesson(){startLesson(state.lessonId);}

// ── INIT ──
buildHome();
</script>
</body>
